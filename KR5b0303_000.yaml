front:
  text: 十洲記惟八
  hash: sha256:94e71fb2bfa53d3416464679b3dfdc4a5868a483d8406ef8f65c2c177ace9a03
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0303_HFL_000-001a, image: hfl/0330/0330-138.png}
body:
  text: 東方朔集漢武帝既聞王母説八方巨海之中有祖洲瀛洲玄洲炎洲長洲元洲流洲生洲鳯麟洲聚窟洲有此十洲乃人迹所稀絶處又始知東方朔非世常人是以延之曲室而親問十洲所在所有之物名故書記之方朔云臣學仙者耳非得道之人以國家之盛美將招名儒墨於文教之內抑絶俗之道於虛詭之迹臣故韜隱逸而赴工庭藏養生而侍朱闕矣亦由尊上好道且復欲抑絶其威儀也曽隨師主履行比至朱陵扶桑蜃海冥夜之丘純陽之陵始青之下月宫之間內遊七丘中旋十洲踐赤縣而遨五嶽行陂澤而息名山臣自少及今周流六天廣陟天光極於是矣未若淩虛之子飛真之官上下九天洞視百方北極勾陳而并華蓋南翔太丹而棲大夏東之通陽之霞西薄寒穴之野日月所不逮星漢所不與其上無後物其下無復底臣所識乃及於是愧不足以酬廣訪矣祖洲近在東海之中地方五百里去西岸七萬里上有不死之草草形如菰苗長三四尺人已死三日者以草覆之皆當時活也服之令人長生昔秦始皇大苑中多丫死者橫道有鳥如烏狀銜此草覆死人面當時起坐而自活也有司聞奏始皇遣使者齎草以問北郭鬼谷先生鬼谷先生云此草是東海祖洲上有不死之草生瓊田中或名為養神芝其葉似菰苗叢生一株可活一人始皇於是慨然言曰可採得否乃使使者徐福發童男童女五百人率攝樓船等入海尋祖洲遂不返福道士也字君房後亦得道也瀛洲在東海中地方四千里大抵是對會稽去西岸七十萬里上生神芝仙草又有玉石髙且千丈出泉如酒味甘名之為玉醴泉飲之數升輒醉今人長生洲上多仙家風俗似吳人山川如中國也玄洲在北海之中戌亥之地地方七千二百里去南岸三十六萬里上有太玄都仙伯真公所治多丘山又有風山聲響如雷電對天西北門上多太玄仙官仙官宫室各異饒金芝玉草又是三天君下治之處甚肅肅也炎洲在南海中地方二千里去北岸九萬里上有風生獸似豹青色大如貍張網取之積薪數車以燒之薪盡而獸不然灰中而立毛亦不燋斫剌不入打之如皮囊以鐡鎚煆其頭數十下乃死而張口向風須臾復活以石上菖蒲塞其鼻即死取其腦和菊花服之盡十斤得夀五百年又有火林山山中有火光獸大如鼠毛長三四寸或赤或白山可三百里許晦夜即見此山林乃是此獸光照狀如火光相似取其獸毛以緝為布時人號為火浣布此是也國人衣服垢汚以灰汁浣之終無潔淨唯火燒此衣服兩盤飯間振擺其垢自落潔白如雪亦多仙家長洲一名青丘在南海辰巳之地地方各五千里去岸二十五萬里上饒山川又多大樹樹乃有二千圍者一洲之上專是林木故一名青丘又有仙草靈藥甘液玉英靡所不有又有風山山恆震聲有紫府宫天真仙女遊於此地元洲在北海中地方三千里去南岸十萬里上有五芝玄澗澗水如蜜漿飲之長生與天地相畢服此五芝亦得長生不死亦多仙家流洲在西海中地方三千里去東岸十九萬里上多山川積石名為昆吾冶其石作鐵作劔光明洞照如水精狀割玉物如割泥亦多仙家生洲在東海丑寅之間接蓬萊十七萬里地方二千五百里去西岸二十三萬里上有仙家數萬天氣安和芝草常生地無寒暑安養萬物亦多山川仙草衆芝一洲之水味如飴酪至良洲者也鳯麟洲在西海之中央地方一千五百里洲四面有弱水繞之鴻毛不浮不可越也洲上多鳯麟數萬各為群又有山川池澤及神藥百種亦多仙家煮鳯喙及麟角合煎作膠名之為續弦膠或名連金泥此膠能續弓弩已斷之弦刀劔斷折之金更以膠連續之使力士掣之他處乃斷所績之際終無斷也武帝天漢三年帝幸北海祠恆山四月西國王使至獻此膠四兩吉光毛裘武帝受以付外庫不知膠裘二物之妙用也以為西國雖逺而上貢者不竒稽留使者未遣又時武帝幸華林園射虎而弩弦斷使者時從駕又上膠一分使口濡以續弩弦帝驚曰異物也乃使武士數人共對掣引之終日不脫如未續時也膠色青如碧玉吉光毛裘黃色蓋神馬之類也裘入水數日不沉入火不燋帝於是乃悟厚謝使者而遣去賜以牡桂乾薑等諸物是西方國之所無者又益思東方朔之逺見周穆王時西胡獻昆吾割玉刀及夜光常滿杯刀長一尺杯受三升刀切玉如切泥杯是白玉之精光明夜照冥夕出杯於中庭以向天比明而水汁已滿於杯中也汁甘而香美斯實靈人之器秦始皇時西胡獻切玉刀無復常滿杯耳如此膠之所出從鳯麟洲來劔之所出必從流洲來普是西海中所有也聚窟洲在西海中申未地地方三千里北接崑崙二十六萬里去東岸二十四萬里上多真仙靈官宫第比門不可勝數及有獅子辟邪鑿齒天鹿長牙銅頭鐡額之獸洲上有大山形似人鳥之象因名之為人鳥山山多大樹與楓木相類而花葉香聞數百里名為反魂樹扣其樹亦能自作聲聲如群牛吼聞之者皆心震神駭伐其木根心於玉釜中煮取汁更微火煎如黑錫狀令可丸之名曰驚精香或各之為震靈丸或名之為返生香或名之為震檀香或名之為人鳥精或名之為却死香一種六名斯靈物也香氣聞數百里死者在地聞香氣乃却活不復亡也以香薰死人更加神驗延和三年武帝幸安定西胡月支國王遭使獻香四兩大如雀卵黑如桑椹帝以香非中國所有以付外庫又獻猛獸一頭形如五六十日犬子大似貍而色黃命國使將入呈帝見之使者抱之似犬羸細秃悴尤怪其貢之非也問使者此小物可弄何謂猛獸使者對曰夫威加於百禽者不必繫之以大小是以神麟故為巨象之王鸞鳯必為大鵬之宗百足之蟲制於螣蛇亦不在於巨細也臣國去此三十萬里國有帝占東風入律百旬不休青雲干吕連月不散者當知中國時有好道之君我王固將賤百家而貴道儒薄金玉而厚靈物也故搜竒藴而貢神香步天林而請猛獸乘毳車而濟弱淵策驥足以度飛沙契闊途遙辛苦蹊路于今已十三年矣神香起夭殘之死疾猛獸却百邪之魅鬼夫此二物實濟衆生之至要助政化之升平豈圖陛下反不知真乎是臣國占風之謬矣今日仰鑒天姿亦乃非有道之君也眼多視則貪色口多言則犯難身多動則淫賊心多飾則奢侈未有用此四者而成天下之治也武帝恧然不平又問使者猛獸何方而伏百禽食噉何物膂力何比其所生何鄉耶使者曰猛獸所出或生崑崙或生玄圃或生聚窟或生天路其夀不窮食氣飲露解人言語仁慧忠恕當其仁也愛護蠢動不犯虎豹當其威也一聲呌發千人伏息牛馬百物驚斷絙繫武士奄忽失其勢力當其神也立興風雲吐嗽雨露百邪迸走蛟龍騰騖處于太上之廄役御獅子名曰猛獸蓋神化無常能為大禽之宗主乃玃天之元王辟邪之長帥者也靈香雖少斯更生之神丸也疫病炎死者將能起之及聞氣者即活也芳又特甚故難歇也於是帝使使者今猛獸發聲試聽之使者乃指獸命喚一聲獸舐脣良久忽呌如天大雷霹靂又兩目如磹之交光光朗衝天良久乃上帝登時顛蹶掩耳震動不能自止侍者及武士虎賁皆失杖伏地諸內外牛馬豕犬之屬皆絶絆離繫驚駭放蕩久許咸定帝忌之因以此獸付上林苑令虎食之於是虎聞獸來乃相聚屈積如死虎伏獸入苑徑上虎頭溺虎口去十步已來顧視虎虎輒閉目帝恨使者言不遜欲收之明日失使者及猛獸所在遣四出尋討不知所止到後元元年長安城內病者數百亡者太半帝試取月支神香燒之於城內其死未三日者皆活芳氣經三月不歇於是信知其神物也乃更祕録餘香後一旦又失之檢函封印如故無復香也帝愈懊恨恨不禮待於使者益貴方朔之遺語自愧求李君之不勤慙衛叔卿於階庭矣明年帝崩于五祚宫月支國香必人鳥山震檀𨚫死香也向使厚待使者帝崩之時何緣不得靈香之用耶自合命殞矣滄海島在北海中地方三千里去岸二十一萬里海四面繞島各廣五千里水皆蒼色仙人謂之滄海也島上俱是大山積石至多石象八石石腦石桂英流丹黃子石膽之輩百餘種皆生於島石服之神仙長生島中有紫石宫室九老仙都所治仙官數萬人居焉方丈洲在東海中心西南東北岸正等方丈方面各五千里上専是群龍所聚有金玉琉璃之宫三天司命所治之處群仙不欲升天者皆往此洲受太玄生籙仙家數十萬耕田種芝草課計頃畝如種稻狀亦有玉石泉上有九源丈人宫主領天下水神及龍蛇巨鯨隂精水獸之輩扶桑在東海之東岸岸直陸行登岸一萬里東復有碧海海廣狹浩汗與東海等水既不鹹苦正作碧色甘香味美扶桑在碧海之中地方萬里上有太帝宫太真東王父所治處地多林木葉皆如桑又有椹樹長者數千丈大二千餘圍樹兩兩同根偶生更相依倚是以名為扶桑仙人食其椹而一體昔作金光色飛翔空玄其樹雖大其葉椹故如中夏之桑也但椹稀而色赤九千嵗一生實耳味絶甘香美地生紫金尤玉如中夏之瓦石狀真仙靈官變化萬端蓋無常形亦有能分形為百身十丈者也蓬丘蓬萊山是也對東海之東北岸周回五千里外别有圓海繞山圓海水正黑而謂之冥海也無風而洪波百丈不可得往來上有九老丈人九天真王宫蓋太上真人所居唯飛仙有能到其處耳崑崙號曰崑陵在西海戌地北海之亥地去岸十三萬里又有弱水周回繞匝山東南接積石圃西北接北戶之室東北臨大活之井西南至承淵之谷此四角大山實崑崙之支輔也積石圃南頭是王母告周穆王云咸陽去此四十六萬里山髙平地三萬六千里上有三角方廣萬里形似偃盆下狹上廣故名曰崑崙山三角其一角正北干辰之輝名曰閬風巔其一角正西名曰玄圃堂其一角正東名曰崑崙宫其一角有積金為天墉城面方千里城上安金臺五所玉樓十二所其北戶山承淵山又有墉城金臺玉樓相鮮如流精之闕光碧之堂瓊華之室紫翠丹房景雲燭日朱霞九光西王母之所治也真官仙靈之所宗上通璿璣元氣流布五常玉衡理九天而調隂陽品物群生希竒特出皆在於此天人濟濟不可具記此乃天地之根紐萬度之綱柄矣是以太上名山鼎於五方鎮地理也號天柱於珉城象綱輔也諸百川極深水靈居之其隂難到故治無常處非如丘陵而可得論爾乃天地設位物象之冝上聖觀方緣形而著爾乃處玄風於西極坐王母於坤鄉昆吾鎮於流澤扶桑植於碧津離合火精而光獸生於炎野坎總衆隂是以仙都宅于海島艮位名山蓬山鎮於寅丑巽體元女養巨水於長洲髙風鼓於群龍之位暢靈符於瑕丘至妙玄深幽神難盡真人隱宅靈陵所在六合之內豈唯數處而已哉此蓋舉其摽末爾臣朔所見不博未能宣通王母及上元夫人聖旨昔曽聞之於得道者説此十洲大丘靈阜皆是真仙隩墟神官所治其餘山川萬端並無覿者矣其北海外又有鍾山在北海之子地隔弱水之北一萬九千里髙一萬三千里上方七千里周旋三萬里自生玉芝及神草四十餘種上有金臺玉闕亦元氣之所舍天帝君治處也鍾山之南有平邪山北有蛟龍山西有徑草山東有束木山四山並鍾山之枝幹也四山髙鍾山三萬里官城五所如一登四面山下望乃見鍾山爾四面山乃天帝君之城域也仙真之人出入道經自一路從平邪山東南入穴中乃到鍾山北阿門外也天帝君總九天之維貴無比焉山源周回具有四城之髙但當心有觀於崑崙也昔禹治洪水既畢乃乘蹻車度弱水而到此山祠上帝於北阿歸大功於九天又禹經諸五嶽使工刻石識其里數髙下其字科斗書非漢人所書今丈尺里數皆禹時書也不但刻剫五嶽諸名山亦然刻山之獨髙處爾今書是臣朔所具見其王母所道諸靈藪禹所不履唯書中夏之名山爾臣先師谷希子者太上真官也昔授臣崑崙鐘山蓬萊山及神洲真形圖昔來入漢留以寄知故人此書又尤重於嶽形圖矣昔也傳授年限正同爾陛下好道思微甄心內向天尊下降並傳授寶祕臣朔區區亦何嫌惜而不上所有哉然術家幽其事道法祕其師術泄則事多疑師顯則妙理散願且勿宣臣之意也武帝欣聞至説明年遂復從受諸真形圖常帶之肘後八節常朝拜靈書以書求度脫焉朔謂滑稽逆知預觀帝心故弄萬乘傲公侯不可得而師友不可得而喜怒故武帝不能盡至理於此人矣十洲記
